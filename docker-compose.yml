version: '3.8'

services:
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: yotoshare-autoheal
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
      - AUTOHEAL_INTERVAL=30
      - AUTOHEAL_START_PERIOD=60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - yotoshare-network

  backend:
    build: ./backend
    container_name: yotoshare-backend
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/yotoshare.db}
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ${NAS_MOUNT_PATH:-./storage}:/mnt/nas/myo
    restart: unless-stopped
    networks:
      - yotoshare-network
      - traefik-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
    container_name: yotoshare-frontend
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - yotoshare-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: yotoshare-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - yotoshare-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  yotoshare-network:
    driver: bridge
  traefik-net:
    external: true
